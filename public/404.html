<!doctype html>
<html lang="zh-CN">
  <head>

      * {

      }

      body {
        margin: 0;
        font-family:
          "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui,
          sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .wrap {
        min-height: 100vh;
        padding: 48px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 100%;
        max-width: 880px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        padding: 40px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.05);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #2563eb;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: #020617;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .mark svg {
        width: 25px;
        height: 25px;
      }

      h1 {
        margin: 28px 0 12px;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .lead {
        max-width: 660px;
        margin: 0;
        color: #475569;
        font-size: 16px;
        line-height: 1.9;
      }

      .links {
        margin-top: 28px;
        padding: 20px;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #f8fafc;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .entry {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: #fff;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 700;
        color: #1e293b;
      }

      .entry:hover {
        border-color: #bfdbfe;
        color: #2563eb;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
      }

      .hint {
        margin: 18px 0 0;
        color: #64748b;
        font-size: 14px;
        line-height: 1.8;
      }

      .related {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #f1f5f9;
      }

      .tag {
        border: 1px solid #e2e8f0;
        border-radius: 999px;
        background: #fff;
        padding: 6px 12px;
        color: #64748b;
        font-size: 12px;
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 24px 14px;
        }

        .card {
          padding: 26px;
          border-radius: 22px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>

    <script>
      (function () {
